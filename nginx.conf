server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Serve static files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy Docker API requests to the socket proxy (version prefix optional)
    location ~ ^/v[0-9]+\.[0-9]+/ {
        proxy_pass http://docker-socket:2375;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
    }
} 